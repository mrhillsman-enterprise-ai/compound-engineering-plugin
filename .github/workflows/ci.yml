name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  pr-title:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - name: Validate PR title
        shell: bash
        run: |
          title='${{ github.event.pull_request.title }}'
          if [[ ! "$title" =~ ^[a-z]+(\([^)]+\))?(!)?:\ .+ ]]; then
            echo "PR title must use conventional format: type(optional-scope): description"
            echo "Examples: 'fix: correct release preview', 'feat(coding-tutor): add quiz reset'"
            exit 1
          fi

  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Validate release metadata
        run: bun run release:validate

      - name: Run tests
        run: bun test
